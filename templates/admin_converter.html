<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIRU | Converter Admin</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="site-header app-header">
      <a href="/" class="brand-link" aria-label="VIRU home">
        <div class="brand">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="VIRU logo" class="brand-logo" />
          <div>
            <p class="brand-kicker">Document Workspace</p>
            <h1>Converter Admin</h1>
          </div>
        </div>
      </a>
      <div class="app-head-actions">
        <a href="/converter" class="ghost-link">Converter</a>
        <a href="/conversions" class="ghost-link">My Conversions</a>
      </div>
    </header>

    <main class="app-shell">
      <section class="panel work-toolbar">
        <div>
          <h2>System Metrics</h2>
          <p id="adminStatus" class="status">Checking admin access...</p>
        </div>
        <div class="inline-actions">
          <input id="cleanupDays" type="number" min="0" value="7" placeholder="Days" />
          <button id="cleanupBtn" class="ghost-btn" type="button">Cleanup Old Jobs</button>
          <button id="refreshBtn" class="primary-btn" type="button">Refresh Metrics</button>
        </div>
      </section>

      <section class="converter-bottom-grid">
        <section class="panel converter-panel">
          <div class="converter-section-head">
            <h3>Metrics Snapshot</h3>
            <p>System-wide converter usage, statuses, and format trends.</p>
          </div>
          <pre id="metricsView" class="logs-view">No metrics loaded yet.</pre>
        </section>

        <section class="panel converter-panel">
          <div class="converter-section-head">
            <h3>Recent Jobs</h3>
            <p>Latest conversion jobs across all users.</p>
          </div>
          <div id="recentJobs" class="converter-history"></div>
        </section>
      </section>
    </main>

    <script type="module" src="{{ url_for('static', filename='js/admin_converter.js') }}"></script>
  </body>
</html>
