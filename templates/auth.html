<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIRU | Login</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="site-header">
      <a href="/" class="brand-link" aria-label="VIRU home">
        <div class="brand">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="VIRU logo" class="brand-logo" />
          <div>
            <p class="brand-kicker">Secure Access</p>
            <h1>Account Access</h1>
          </div>
        </div>
      </a>
      <a href="/" class="ghost-link">Back to Landing</a>
    </header>

    <main class="auth-shell">
      <section class="panel auth-card">
        <div class="auth-head">
          <h2>Login or Register</h2>
          <p>Authentication is required before opening generator and project settings.</p>
        </div>

        <div class="auth-tabs" role="tablist" aria-label="Authentication options">
          <button id="tabLogin" class="auth-tab active" type="button" role="tab" aria-selected="true">Login</button>
          <button id="tabRegister" class="auth-tab" type="button" role="tab" aria-selected="false">Register</button>
        </div>

        <form id="loginForm" class="auth-form" autocomplete="on">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" required />

          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" required minlength="6" />

          <button type="submit" class="primary-btn">Login</button>
        </form>

        <form id="registerForm" class="auth-form hidden" autocomplete="on">
          <label for="registerName">Display Name</label>
          <input id="registerName" type="text" required minlength="2" />

          <label for="registerEmail">Email</label>
          <input id="registerEmail" type="email" required />

          <label for="registerPassword">Password</label>
          <input id="registerPassword" type="password" required minlength="6" />

          <button type="submit" class="primary-btn">Create Account</button>
        </form>

        <p id="authStatus" class="status" role="status" aria-live="polite">Checking auth status...</p>
      </section>
    </main>

    <script type="module" src="{{ url_for('static', filename='js/auth.js') }}"></script>
  </body>
</html>
