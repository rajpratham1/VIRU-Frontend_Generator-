<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIRU | My Conversions</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="site-header app-header">
      <a href="/" class="brand-link" aria-label="VIRU home">
        <div class="brand">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="VIRU logo" class="brand-logo" />
          <div>
            <p class="brand-kicker">Document Workspace</p>
            <h1>My Conversions</h1>
          </div>
        </div>
      </a>
      <div class="app-head-actions">
        <a href="/converter" class="ghost-link">Open Converter</a>
        <a href="/app" class="ghost-link">Workspace</a>
        <button id="logoutBtn" class="ghost-btn" type="button">Logout</button>
      </div>
    </header>

    <main class="app-shell">
      <section class="panel work-toolbar">
        <div>
          <h2>Conversion History</h2>
          <p id="authStatus" class="status">Checking session...</p>
        </div>
        <div class="inline-actions">
          <input id="searchInput" type="text" placeholder="Search by file name or format" />
          <button id="refreshBtn" class="ghost-btn" type="button">Refresh</button>
        </div>
      </section>

      <section class="work-grid-layout conversions-layout">
        <section class="panel work-list-panel">
          <div id="jobsGrid" class="projects-grid"></div>
          <p id="emptyState" class="status hidden">No conversion jobs yet. Use `/converter` to process documents.</p>
        </section>

        <section class="panel work-viewer-panel">
          <div class="output-header">
            <h2 id="viewerTitle">Select a conversion job</h2>
            <p id="viewerMeta" class="chip">No job selected</p>
          </div>

          <div class="code-actions">
            <button id="previewBtn" class="ghost-btn" type="button">Reload Preview</button>
            <button id="downloadBtn" class="ghost-btn" type="button">Download Output</button>
            <button id="deleteBtn" class="ghost-btn danger-btn" type="button">Delete Job</button>
          </div>

          <pre id="viewerNotes" class="logs-view">Select a job to inspect notes, preview, and output metadata.</pre>
          <div id="viewerPreviewPane" class="converter-preview-pane">
            <p class="converter-empty">No preview loaded.</p>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="{{ url_for('static', filename='js/conversions.js') }}"></script>
  </body>
</html>
