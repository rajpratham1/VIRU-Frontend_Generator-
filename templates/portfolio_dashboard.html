<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIRU | Portfolio Dashboard</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="site-header">
      <a href="/app" class="brand-link" aria-label="VIRU workspace">
        <div class="brand">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="VIRU logo" class="brand-logo" />
          <div>
            <p class="brand-kicker">Portfolio Workspace</p>
            <h1>My Portfolios</h1>
          </div>
        </div>
      </a>
      <div class="inline-actions">
        <p id="portfolioDashboardAuthStatus" class="chip">Checking session...</p>
        <a href="/generate" class="ghost-link">Create Portfolio</a>
        <a href="/app" class="ghost-link">Workspace</a>
        <button id="portfolioDashboardLogoutBtn" class="ghost-btn" type="button">Logout</button>
      </div>
    </header>

    <main class="landing-shell portfolio-shell">
      <section class="panel portfolio-panel">
        <div class="converter-section-head">
          <h3>Your Portfolio List</h3>
          <p>Manage public pages, open live links, edit content, and remove outdated versions.</p>
        </div>
        <div class="top-actions">
          <a href="/generate" class="primary-btn">New Portfolio</a>
          <button id="portfolioDashboardRefreshBtn" class="ghost-btn" type="button">Refresh</button>
        </div>
        <p id="portfolioDashboardStatus" class="status">Loading portfolios...</p>
        <div id="portfolioDashboardList" class="portfolio-dashboard-grid"></div>
      </section>
    </main>

    <script type="module" src="{{ url_for('static', filename='js/portfolio_dashboard.js') }}"></script>
  </body>
</html>
